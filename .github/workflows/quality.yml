name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vite-plus@v1

      - name: Install dependencies
        run: vp install

      - name: Run check
        run: vp check

      - name: Run test
        run: vp test
